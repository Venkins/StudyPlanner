<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>智能学习计划 - 多周期版</title>
<style>
:root{--bg:#f0f4ff;--card:#fff;--primary:#5b6af5;--plight:#eef0ff;--text:#2d3a5a;--tlight:#7a87aa;--border:#e2e7f3;--shadow:0 4px 24px rgba(91,106,245,.1);--radius:14px}
*{box-sizing:border-box;margin:0;padding:0}body{font-family:'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.top-header{background:linear-gradient(135deg,#5b6af5,#8b5cf6,#ec4899);color:#fff;padding:18px 28px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;position:sticky;top:0;z-index:100}
.top-header h1{font-size:1.35rem;font-weight:800}.date-badge{background:rgba(255,255,255,.2);border-radius:20px;padding:6px 16px;font-size:.85rem}.btn-hd{background:rgba(255,255,255,.18);border:1.5px solid rgba(255,255,255,.45);color:#fff;border-radius:20px;padding:7px 16px;cursor:pointer;font-size:.82rem;font-weight:600}.btn-hd:hover{background:rgba(255,255,255,.33)}
.period-bar{background:var(--card);border-bottom:1px solid var(--border);padding:0 24px;display:flex;align-items:center;justify-content:center;gap:4px;position:sticky;top:62px;z-index:99}
.period-tab{padding:11px 26px;border:none;background:transparent;font-size:.92rem;font-weight:700;color:var(--tlight);cursor:pointer;transition:all .2s}.period-tab:hover{color:var(--primary);background:var(--plight)}.period-tab.active{color:var(--primary);background:var(--plight);border-bottom:3px solid var(--primary);border-radius:8px 8px 0 0}
.container{display:flex;gap:20px;padding:20px 24px;max-width:1440px;margin:0 auto}.panel-left{width:340px;flex-shrink:0;display:flex;flex-direction:column;gap:14px}
.card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);padding:18px;border:1px solid var(--border)}.card h2{font-size:.95rem;font-weight:700;color:var(--primary);margin-bottom:13px;display:flex;align-items:center;gap:6px}
.day-picker-row{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:12px}.day-btn{width:36px;height:36px;border-radius:10px;border:2px solid var(--border);background:var(--card);font-size:.78rem;font-weight:700;cursor:pointer;transition:all .15s;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--text)}.day-btn:hover{border-color:var(--primary);background:var(--plight)}.day-btn.active{background:linear-gradient(135deg,#5b6af5,#8b5cf6);color:#fff;border-color:transparent;box-shadow:0 3px 12px rgba(91,106,245,.35)}
.form-group{margin-bottom:11px}.form-group label{display:block;font-size:.76rem;font-weight:600;color:var(--tlight);margin-bottom:4px;text-transform:uppercase;letter-spacing:.5px}.form-group input,.form-group textarea{width:100%;border:1.5px solid var(--border);border-radius:9px;padding:8px 11px;font-size:.88rem;color:var(--text);background:#fafbff;outline:none;transition:border .2s;font-family:inherit}.form-group textarea{resize:vertical;min-height:52px}.form-row{display:flex;gap:8px}.form-row .form-group{flex:1}
.color-row{display:flex;gap:7px;flex-wrap:wrap;margin-top:4px}.color-dot{width:27px;height:27px;border-radius:50%;cursor:pointer;border:3px solid transparent;transition:transform .15s}.color-dot:hover{transform:scale(1.15)}.color-dot.selected{border-color:#fff;box-shadow:0 0 0 2.5px var(--primary)}
.cat-tags{display:flex;gap:5px;flex-wrap:wrap;margin-top:4px}.cat-tag{padding:4px 11px;border-radius:20px;font-size:.78rem;font-weight:600;cursor:pointer;border:1.5px solid transparent;transition:all .15s;background:#f0f4ff;color:var(--tlight)}.cat-tag.active{background:var(--primary);color:#fff;border-color:var(--primary)}
.repeat-section{background:#fafbff;border:1.5px dashed var(--border);border-radius:10px;padding:10px 12px;margin-top:4px}.repeat-section label{display:block;margin-bottom:6px;font-size:.82rem!important;font-weight:700!important}.repeat-opts{display:flex;gap:5px;flex-wrap:wrap}.rep-opt{padding:4px 11px;border-radius:18px;font-size:.76rem;font-weight:600;cursor:pointer;border:1.5px solid var(--border);background:var(--card);color:var(--tlight);transition:all .15s}.rep-opt.active{background:var(--primary);color:#fff;border-color:var(--primary)}
.btn-add{width:100%;background:linear-gradient(135deg,#5b6af5,#8b5cf6);color:#fff;border:none;border-radius:10px;padding:11px;font-size:.93rem;font-weight:700;cursor:pointer;transition:all .2s;margin-top:4px}.btn-add:hover{opacity:.9}
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}.stat-item{background:var(--plight);border-radius:10px;padding:11px 8px;text-align:center}.stat-num{font-size:1.3rem;font-weight:800;color:var(--primary)}.stat-label{font-size:.72rem;color:var(--tlight)}
.legend-list{display:flex;flex-direction:column;gap:7px;max-height:220px;overflow-y:auto}.legend-item{display:flex;align-items:center;gap:8px;padding:7px 9px;border-radius:8px;background:#fafbff;border:1px solid var(--border)}.legend-dot{width:10px;height:10px;border-radius:50%}.legend-name{font-size:.82rem;font-weight:700;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.legend-bar-wrap{flex:1;height:5px;background:#e8ebf5;border-radius:3px}.legend-bar{height:100%;border-radius:3px}.legend-pct{font-size:.72rem;color:var(--tlight);min-width:28px;text-align:right}
.panel-right{flex:1;min-width:0}.view-toolbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;flex-wrap:wrap;gap:8px}.view-toolbar h2{font-size:.95rem;font-weight:700;display:flex;align-items:center;gap:6px}.view-toggle{display:flex;gap:5px}.btn-vw{padding:5px 13px;border-radius:18px;border:1.5px solid var(--border);background:var(--card);color:var(--tlight);font-size:.78rem;font-weight:600;cursor:pointer;transition:all .15s}.btn-vw.active{background:var(--primary);color:#fff;border-color:var(--primary)}
.copy-toolbar{display:flex;align-items:center;gap:8px;margin-bottom:12px;background:linear-gradient(90deg,#eff6ff,#fdf4ff);border:1.5px solid var(--border);border-radius:10px;padding:10px 14px;flex-wrap:wrap}.copy-toolbar label{font-size:.82rem;font-weight:700;color:var(--primary)}.btn-copy-action{padding:6px 14px;border-radius:18px;border:1.5px solid var(--border);background:var(--card);color:var(--text);font-size:.8rem;font-weight:700;cursor:pointer;transition:all .15s;white-space:nowrap}.btn-copy-action.primary-btn{background:linear-gradient(135deg,#22c55e,#10b981);color:#fff;border:none}.btn-copy-action.danger-btn{background:linear-gradient(135deg,#ef4444,#dc2626);color:#fff;border:none}
.timeline-strip{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);border:1px solid var(--border);overflow:hidden}.timeline-ruler{display:flex;height:30px;background:#f7f8ff;border-bottom:1px solid var(--border)}.ruler-tick{flex:1;font-size:.68rem;color:var(--tlight);border-right:1px solid var(--border);display:flex;align-items:center;padding-left:3px;font-weight:600}#visual-timeline{padding:14px 16px}
.vis-row{display:flex;align-items:center;height:38px;margin-bottom:4px}.vis-label{width:48px;font-size:.72rem;color:var(--tlight);font-weight:700;flex-shrink:0;text-align:right;padding-right:8px}.vis-bar-area{flex:1;height:30px;background:#f0f3fc;border-radius:7px;position:relative;overflow:hidden}.vis-block{position:absolute;height:100%;border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:.72rem;font-weight:700;color:#fff;cursor:pointer;overflow:hidden;white-space:nowrap;transition:filter .2s,transform .1s;padding:0 7px;border:2px solid rgba(255,255,255,.35)}.vis-block:hover{filter:brightness(1.1);transform:scaleY(1.06)}
.week-grid{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);border:1px solid var(--border);overflow-x:auto}.week-header{display:flex;border-bottom:2px solid var(--primary);background:linear-gradient(135deg,var(--primary),#8b5cf6)}.wh-cell{flex:1;min-width:130px;padding:10px 6px;text-align:center;color:#fff;font-size:.8rem;font-weight:700}.wb-hour{display:flex;min-height:44px;border-bottom:1px solid #f0f3fc}.wb-label{width:48px;flex-shrink:0;font-size:.68rem;color:var(--tlight);font-weight:600;display:flex;align-items:center;padding-left:6px;border-right:1px solid var(--border);background:#fafbff}.wb-col{flex:1;min-width:130px;border-right:1px solid var(--border);position:relative;padding:2px 3px}.wb-col:last-child{border-right:none}.wb-task{position:absolute;left:3px;right:3px;border-radius:5px;padding:2px 5px;font-size:.68rem;font-weight:700;color:#fff;overflow:hidden;cursor:pointer;border:1.5px solid rgba(255,255,255,.35);display:flex;align-items:center;gap:3px;z-index:2}.wb-task:hover{filter:brightness(1.1);z-index:5}
.month-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:10px}.day-card{background:var(--card);border-radius:10px;box-shadow:var(--shadow);border:1px solid var(--border);padding:10px 12px;transition:transform .15s;cursor:pointer}.day-card:hover{transform:translateY(-2px)}.day-card.today-card{border-color:var(--primary);border-width:2px}.dc-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}.dc-dayname{font-size:.82rem;font-weight:800;color:var(--primary)}.dc-datenm{font-size:.7rem;color:var(--tlight);font-weight:600}.dc-bar{height:16px;border-radius:4px;font-size:.6rem;font-weight:700;color:#fff;padding:0 5px;display:flex;align-items:center;overflow:hidden;white-space:nowrap;margin-bottom:3px;border:1px solid rgba(255,255,255,.25)}.dc-stat{display:flex;justify-content:space-between;margin-top:5px;font-size:.68rem;color:var(--tlight);font-weight:600}.dc-empty{font-size:.72rem;color:var(--tlight);text-align:center;padding:8px 0}
.task-list-area{display:flex;flex-direction:column;gap:8px}.task-card{display:flex;align-items:center;gap:10px;background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);padding:12px 16px;border-left:5px solid #ccc;transition:transform .15s}.task-card:hover{transform:translateX(3px)}
.task-trange{min-width:105px;font-size:.8rem;font-weight:700;color:var(--tlight);flex-shrink:0}.task-cbar{width:4px;border-radius:2px;align-self:stretch;flex-shrink:0}.task-info{flex:1;min-width:0}.task-title{font-size:.92rem;font-weight:700;color:var(--text)}.task-desc{font-size:.78rem;color:var(--tlight);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.task-cbadge{font-size:.71rem;font-weight:700;padding:3px 9px;border-radius:18px;color:#fff;flex-shrink:0}.task-actions{display:flex;gap:5px}.btn-icon{width:29px;height:29px;border-radius:8px;border:1.5px solid var(--border);background:#fafbff;color:var(--tlight);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:.84rem;transition:all .15s}.btn-icon:hover{background:var(--primary);color:#fff}.btn-icon.del:hover{background:#ef4444}
.empty-state{text-align:center;padding:50px 20px;color:var(--tlight)}.empty-state .emoji{font-size:2.8rem;margin-bottom:10px}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);backdrop-filter:blur(4px);z-index:1000;display:none;align-items:center;justify-content:center}.modal-overlay.open{display:flex}.modal{background:var(--card);border-radius:18px;box-shadow:0 20px 60px rgba(0,0,0,.22);padding:26px;width:440px;max-width:94vw;animation:fiUp .25s ease;max-height:90vh;overflow-y:auto}@keyframes fiUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}.modal h3{font-size:1.05rem;font-weight:700;margin-bottom:16px;color:var(--primary)}.modal-actions{display:flex;gap:10px;margin-top:16px}.btn-cancel{flex:1;padding:10px;border:1.5px solid var(--border);background:#fafbff;color:var(--tlight);border-radius:10px;font-size:.88rem;cursor:pointer}.btn-save{flex:2;padding:10px;background:linear-gradient(135deg,#5b6af5,#8b5cf6);color:#fff;border:none;border-radius:10px;font-size:.88rem;cursor:pointer}
.toast{position:fixed;bottom:26px;left:50%;transform:translateX(-50%) translateY(80px);background:#2d3a5a;color:#fff;padding:11px 22px;border-radius:25px;font-size:.86rem;z-index:9999;transition:transform .3s;pointer-events:none}.toast.show{transform:translateX(-50%) translateY(0)}.export-menu{position:fixed;top:70px;right:18px;background:var(--card);border-radius:14px;box-shadow:0 8px 40px rgba(0,0,0,.18);z-index:500;display:none;animation:fiUp .2s;min-width:170px}.export-menu.open{display:block}.export-item{display:flex;align-items:center;gap:9px;padding:10px 13px;border-radius:9px;cursor:pointer;font-size:.86rem;font-weight:600;transition:background .15s}.export-item:hover{background:var(--plight);color:var(--primary)}::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:#c8d0ee;border-radius:3px}@media print{body{background:#fff}.panel-left,.top-header,.period-bar,.export-menu,.copy-toolbar{display:none!important}}@media(max-width:900px){.container{flex-direction:column;padding:12px}.panel-left{width:100%}}</style></head><body>
<div class="top-header"><h1>📅 智能学习计划</h1><div class="header-center"><div class="date-badge" id="todayDate"></div></div><div class="header-actions"><button class="btn-hd" onclick="toggleExportMenu()">📤 导出</button></div></div>
<div class="period-bar" id="periodBar"></div>
<div class="export-menu" id="exportMenu"><div class="export-item" onclick="exportAsJSON()">📄 JSON</div><div class="export-item" onclick="exportAsCSV()">📊 CSV</div><div class="export-item" onclick="exportAsPrint()">🖨️ 打印/PDF</div></div>
<div class="container"><div class="panel-left">
<div class="card" id="pickerCard" style="display:none"><h2>🗓️ 选择日期</h2><div class="day-picker-row" id="dayPickerRow"></div></div>
<div class="card"><h2>➕ 添加时间块</h2>
<div class="form-row"><div class="form-group"><label>开始时间</label><input type=time id=startTime value="08:00"></div><div class="form-group"><label>结束时间</label><input type=time id=endTime value="09:00"></div></div>
<div class="form-group"><label>任务名称</label><input type=text id=taskName placeholder="例如：数学练习" maxlength=30></div>
<div class="form-group"><label>描述</label><textarea id=taskDesc placeholder="简单描述…"></textarea></div>
<div class="form-group"><label>分类</label><div class=cat-tags id=catTags></div></div>
<div class="form-group"><label>颜色</label><div class=color-row id=colorPicker></div></div>
<div class="repeat-section"><label>🔄 重复规则</label><div class=repeat-opts id=repeatOpts>
<span class="rep-opt active" data-rp="">仅当天</span><span class=rep-opt data-rp=daily>每天</span><span class=rep-opt data-rp=workdays>工作日</span><span class=rep-opt data-rp=weekend>周末</span><span class=rep-opt data-rp=weekly>每周</span>
</div></div><button class=btn-add onclick=addTask()>✅ 添加到计划</button></div>
<div class="card"><h2>📊 统计</h2><div class=stats-grid><div class=stat-item><div class=stat-num id=statCount>0</div><div class=stat-label>任务数</div></div><div class=stat-item><div class=stat-num id=statHours>0h</div><div class=stat-label>已规划</div></div><div class=stat-item><div class=stat-num id=statFree>24h</div><div class=stat-label>空闲</div></div><div class=stat-item><div class=stat-num id=statCats>0</div><div class=stat-label>分类</div></div></div></div>
<div class="card"><h2>🏷️ 分类概览</h2><div class=legend-list id=legendList><div style="color:var(--tlight);text-align:center;padding:10px">暂无任务</div></div></div></div>
<div class="panel-right">
<div class=view-toolbar><h2 id=viewTitle>🗓️ 时间规划</h2><div class=view-toggle><button class="btn-vw active" onclick="switchView('bar')" id=btn-bar>📊 可视化</button><button class=btn-vw onclick="switchView('list')" id=btn-list>📋 列表</button></div></div>
<div class="copy-toolbar" id=copyToolbar style="display:none"><label id=copyLabel>🔄 批量操作：</label>
<button class="btn-copy-action primary-btn" onclick=copyToAllWeekDays()>复制到本周全部天数</button>
<button class="btn-copy-action" onclick=copyToNextWeek()>复制到下周</button>
<button class="btn-copy-action danger-btn" onclick=clearCurrentPeriodTasks()>清空当前周期</button></div>
<div class=timeline-strip id=barView><div class=timeline-ruler id=timelineRuler></div><div id=visual-timeline></div></div>
<div id=listView style="display:none"><div class=task-list-area id=taskList></div></div>
<div id=weekView style="display:none"><div class=week-grid id=weekGrid></div></div>
<div id=monthView style="display:none"><div class=month-grid id=monthGrid></div></div></div></div>
<div class=modal-overlay id=editModal><div class=modal><h3>✏️ 编辑时间块</h3><input type=hidden id=editIndex><input type=hidden id=editDayKey>
<div class=form-row><div class=form-group><label>开始</label><input type=time id=editStart></div><div class=form-group><label>结束</label><input type=time id=editEnd></div></div>
<div class=form-group><label>名称</label><input type=text id=editName maxlength=30></div>
<div class=form-group><label>描述</label><textarea id=editDesc></textarea></div>
<div class=form-group><label>分类</label><div class=cat-tags id=editCatTags></div></div>
<div class=form-group><label>颜色</label><div class=color-row id=editColorPicker></div></div>
<div class=modal-actions><button class=btn-cancel onclick=closeModal()>取消</button><button class=btn-save onclick=saveEdit()>保存</button></div></div></div>
<div class=toast id=toast></div>
<script>
(function(){
const C=['#5b6af5','#8b5cf6','#ec4899','#f43f5e','#f97316','#eab308','#22c55e','#10b981','#06b6d4','#3b82f6'];
const K=[{n:'学习',i:'📚'},{n:'锻炼',i:'💪'},{n:'休息',i:'😴'},{n:'娱乐',i:'🎮'},{n:'工作',i:'💼'},{n:'饮食',i:'🍱'},{n:'其他',i:'⭐'}];
const DN=['周日','周一','周二','周三','周四','周五','周六'];
const PS=[{k:'day',l:'日计划',o:'📅'},{k:'week',l:'周计划',o:'📆'},{k:'month',l:'月计划',o:'🗓️'},{k:'quarter',l:'季度计划',o:'🌿'}];
let AD={},sc=C[0],sk='学习',ec=C[0],ek='学习',sr='',cp='day',cdk='',WD=[];
function $(id){return document.getElementById(id)}
function fd(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')}
function pd(s){var p=s.split('-').map(Number);return new Date(p[0],p[1]-1,p[2])}
function aD(s,n){var d=pd(s);d.setDate(d.getDate()+n);return fd(d)}
function tS(){return fd(new Date())}
function gWD(b){var d=pd(b),dy=d.getDay(),m=new Date(d);m.setDate(d.getDate()-((dy+6)%7));var r=[];for(var i=0;i<7;i++){var x=new Date(m);x.setDate(m.getDate()+i);r.push(fd(x))}return r}
function gMD(y,m){var r=[],dd=new Date(y,m-1,1);while(dd.getMonth()===m-1){r.push(fd(new Date(dd)));dd.setDate(dd.getDate()+1)}return r}
function gQD(b){var d=pd(b),q=Math.floor(d.getMonth()/3),sm=q*3,r=[];var sd=new Date(d.getFullYear(),sm,1),ed=new Date(d.getFullYear(),sm+3,0);for(var dd=new Date(sd);dd<=ed;dd.setDate(dd.getDate()+1))r.push(fd(new Date(dd)));return r}
function lD(){try{AD=JSON.parse(localStorage.getItem('spData')||'{}')}catch(e){AD={}}}
function sD(){localStorage.setItem('spData',JSON.stringify(AD))}
function gT(k){if(!AD[k])AD[k]=[];return AD[k]}
function tM(t){var p=t.split(':').map(Number);return p[0]*60+p[1]}
function dur(s,e){return tM(e)-tM(s)}
function fD(m){if(m<60)return m+'min';var h=Math.floor(m/60),r=m%60;return r?h+'h'+r+'m':h+'h'}
function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot')}
function toast(msg){var t=$('toast');t.textContent=msg;t.classList.add('show');clearTimeout(t._tm);t._tm=setTimeout(function(){t.classList.remove('show')},2400)}

function buildPT(){var b=$('periodBar');b.innerHTML='';PS.forEach(function(p){var t=document.createElement('button');t.className='period-tab'+(p.k===cp?' active':'');t.innerHTML='<span>'+p.o+'</span>'+p.l;t.onclick=function(){switchP(p.k)};b.appendChild(t)})}
function switchP(k){cp=k;buildPT();renderCP()}
function buildCP(id,cols,onSel,ini){var c=$(id);c.innerHTML='';cols.forEach(function(col){var d=document.createElement('div');d.className='color-dot'+(col===ini?' selected':'');d.style.background=col;d.onclick=function(){c.querySelectorAll('.color-dot').forEach(function(x){x.classList.remove('selected')});d.classList.add('active');onSel(col)};c.appendChild(d)})}
function buildCT(id,onSel,ini){var c=$(id);c.innerHTML='';K.forEach(function(cat){var t=document.createElement('div');t.className='cat-tag'+(cat.n===ini?' active':'');t.textContent=cat.i+' '+cat.n;t.onclick=function(){c.querySelectorAll('.cat-tag').forEach(function(x){x.classList.remove('active')});t.classList.add('active');onSel(cat.n)};c.appendChild(t)})}
function buildRO(){$('#repeatOpts').querySelectorAll('.rep-opt').forEach(function(el){el.onclick=function(){document.querySelectorAll('#repeatOpts .rep-opt').forEach(function(x){x.classList.remove('active')});el.classList.add('active');sr=el.dataset.rp}})}

function checkOV(st,en,tasks,exIdx){return tasks.some(function(t,i){if(i===exIdx)return false;return!(en<=t.start||st>=t.end)})}

function renderDV(dk){

}

function renderVisual(tasks){
var c=$('visual-timeline');c.innerHTML='';
for(var h=0;h<24;h+=2){
var rs=h*60,re=rs+120,row=document.createElement('div');row.className='vis-row';
var lbl=document.createElement('div');lbl.className='vis-label';lbl.textContent=String(h).padStart(2,'0')+':00';row.appendChild(lbl);
var ba=document.createElement('div');ba.className='vis-bar-area';
for(var ti=0;ti<tasks.length;ti++){
var t=tasks[ti],ts=tM(t.start),te=tM(t.end),cs=Math.max(ts,rs),ce=Math.min(te,re);
if(ce<=cs)continue;
var l=((cs-rs)/120)*100,w=((ce-cs)/120)*100;
var blk=document.createElement('div');blk.className='vis-block';
blk.style.left=l+'%';blk.style.width=w+'%';blk.style.background=t.color;
blk.title=t.start+'\u2013'+t.end+' '+t.name;
blk.innerHTML=w>8?t.name:'';
var realIdx=gT(dk).indexOf(t);
(function(idx,dd){blk.ondblclick=function(){openEdit(idx,dd)}})(realIdx,dk);
ba.appendChild(blk)
}
row.appendChild(ba);c.appendChild(row)
}
}

function renderWV(dates){

var header=document.createElement('div');header.className='week-header';dates.forEach(function(ds){var hc=document.createElement('div');hc.className='wh-cell';hc.innerHTML='<div class="wh-day">'+DN[pd(ds).getDay()]+'</div><div class="wh-date">'+ds+'</div>';header.appendChild(hc)});

var lb=document.createElement('div');lb.className='wb-label';lb.textContent=String(h).padStart(2,'0')+':00';row.appendChild(lb);
dates.forEach(function(ds){
var col=document.createElement('div');col.className='wb-col';
var dayTasks=gT(ds).sort(function(a,b){return a.start.localeCompare(b.start)});
for(var ti=0;ti<dayTasks.length;ti++){
var t=dayTasks[ti];

}}

}
}
